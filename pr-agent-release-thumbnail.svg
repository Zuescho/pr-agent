<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep indigo radial background (dark-moody, inspired by the TypeORM release art) -->
    <radialGradient id="backgroundGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3B2E7B"/>
      <stop offset="100%" stop-color="#140E2A"/>
    </radialGradient>

    <!-- Decorative circle gradients -->
    <radialGradient id="circleGradient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6A4FB0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3B2E7B" stop-opacity="0.3"/>
    </radialGradient>

    <radialGradient id="circleGradient2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A6FD0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2E3F8B" stop-opacity="0.2"/>
    </radialGradient>

    <!-- Cyan button gradient -->
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38E1FF"/>
      <stop offset="100%" stop-color="#1AA0E0"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#backgroundGradient)"/>

  <!-- Decorative background circles -->
  <circle cx="200" cy="150" r="180" fill="url(#circleGradient1)" opacity="0.5"/>
  <circle cx="1000" cy="480" r="220" fill="url(#circleGradient2)" opacity="0.4"/>
  <circle cx="950" cy="100" r="120" fill="url(#circleGradient1)" opacity="0.3"/>
  <circle cx="100" cy="500" r="150" fill="url(#circleGradient2)" opacity="0.3"/>

  <!-- Main content container -->
  <g transform="translate(600, 300)">
    <!-- PR-Agent title with soft shadow -->
    <text x="2" y="-77" text-anchor="middle" font-family="Arial, sans-serif" font-size="66" font-weight="bold" fill="#000000" opacity="0.25">
      PR-Agent
    </text>
    <text x="0" y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-size="66" font-weight="bold" fill="white">
      PR-Agent
    </text>

    <!-- Version number with shadow -->
    <text x="2" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="82" font-weight="bold" fill="#000000" opacity="0.25">
      v0.37.0
    </text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="82" font-weight="bold" fill="#38E1FF">
      v0.37.0
    </text>

    <!-- NEW RELEASE pill -->
    <g transform="translate(0, 78)">
      <rect x="-118" y="-24" width="236" height="48" rx="24" fill="url(#buttonGradient)" filter="url(#dropShadow)"/>
      <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0B1020" dominant-baseline="central">
        NEW RELEASE
      </text>
    </g>

    <!-- Tagline -->
    <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="normal" fill="white" opacity="0.7">
      The original open-source AI PR reviewer
    </text>
  </g>

  <!-- Scattered accent dots -->
  <circle cx="380" cy="290" r="12" fill="#38E1FF" opacity="0.5"/>
  <circle cx="820" cy="190" r="7" fill="#38E1FF" opacity="0.6"/>
  <circle cx="180" cy="380" r="5" fill="#38E1FF" opacity="0.7"/>
  <circle cx="1020" cy="330" r="9" fill="#38E1FF" opacity="0.4"/>
  <circle cx="280" cy="450" r="6" fill="#38E1FF" opacity="0.5"/>
  <circle cx="920" cy="420" r="4" fill="#38E1FF" opacity="0.8"/>
</svg>
