# pr-agent secrets — TEMPLATE.
#
# Copy this file to ONE of:
#   pr_agent/settings/.secrets.toml      → for local CLI / dev (already gitignored)
#   pr_agent/settings_prod/.secrets.toml → mounted into the Docker image at runtime
#
# Never commit filled-in secrets. The .secrets.toml dev path is gitignored;
# settings_prod/ is meant to be a runtime mount, not a committed file.
#
# All values below can alternatively be supplied as environment variables
# using double-underscore section separators, e.g. OLLAMA__API_KEY, GITHUB__APP_ID,
# GITHUB__PRIVATE_KEY, GITHUB__WEBHOOK_SECRET. Env vars win over the file.

# ---- LLM backend: choose ONE provider ----
#
# pr-agent routes LLM calls by the MODEL PREFIX in CONFIG__MODEL:
#   ollama/<model>  → litellm Ollama provider, uses [ollama] below
#   openai/<model>  → litellm OpenAI provider, uses [openai] below
#
# ⚠️  FILL IN ONLY ONE provider section. If both [ollama] and [openai] have an
# api_base, Ollama silently wins (litellm sets api_base from [openai] first,
# then [ollama] overwrites it — see pr_agent/algo/ai_handlers/litellm_ai_handler.py
# L150 vs L170). Picking a provider = setting the model prefix + filling the
# matching section below. Leave the other section commented/blank.

# --- Option A: Ollama Cloud (default) ---
# Get an API key at https://ollama.com/settings/keys
# Models: https://ollama.com/search?c=cloud  (prefix with ollama/ in CONFIG__MODEL)
[ollama]
api_base = "https://ollama.com"
api_key = "REPLACE_WITH_OLLAMA_CLOUD_KEY"

# --- Option B: Neuralwatt (OpenAI-compatible) ---
# OpenAI-compatible LLM provider at https://api.neuralwatt.com/v1.
# Get an API key at https://portal.neuralwatt.com (Dashboard → API Keys).
# Models (unauthenticated list): https://api.neuralwatt.com/v1/models
# In CONFIG__MODEL use the openai/ prefix, e.g. openai/kimi-k2.7-code,
# openai/glm-5.2, openai/qwen3.5-397b. The bare model id from /v1/models goes
# after the slash. To switch to this provider: uncomment the [openai] block,
# fill in your key, COMMENT OUT the [ollama] block above, and set
# CONFIG__MODEL to an openai/<neuralwatt-model> value.
# [openai]
# api_base = "https://api.neuralwatt.com/v1"
# api_key = "REPLACE_WITH_NEURALWATT_KEY"

# --- Other OpenAI-compatible providers ---
# The [openai] block above also works for any OpenAI-compatible endpoint
# (OpenAI itself, OpenRouter, Together, DeepSeek, Groq, local vLLM/LM Studio,
# etc.). Just change api_base to the provider's /v1 URL and set the matching
# model id in CONFIG__MODEL with the openai/ prefix.

# ---- GitHub App credentials ----
# Created at https://github.com/settings/apps (see SETUP.md for the exact
# permissions and events). After creating the app, copy its numeric App ID
# here, paste the private key (downloaded from the app's settings page) between
# the BEGIN/END markers, and set the webhook secret you chose.
[github]
deployment_type = "app"
app_id = 123456            # replace with your App ID
webhook_secret = "REPLACE_WITH_WEBHOOK_SECRET"
private_key = """\
-----BEGIN RSA PRIVATE KEY-----
PASTE_THE_DOWNLOADED_PRIVATE_KEY_HERE
-----END RSA PRIVATE KEY-----
"""